        .accordion-header::after {

            color: var(--brand-neon);
        }

        .accordion-item.active .accordion-header::after {

        .accordion-body {

            padding: 0 25px 25px 25px;
            color: var(--text-body);
        }

            background-color: var(--bg-gray);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .matrix-canvas {
            position: relative;
            width: 100%;
            height: 400px;
            border-left: 2px dashed #666;
            border-bottom: 2px dashed #666;
            margin-bottom: 30px;
        }

        .axis-label {
            position: absolute;
            color: var(--brand-orange);
            font-size: 0.9rem;
            font-weight: 700;
        }
        .y-axis { top: -25px; left: -10px; }
        .x-axis { bottom: -25px; right: 0; }

        .matrix-node {
            position: absolute;
            width: 14px;
            height: 14px;
            background-color: var(--brand-neon);
            border-radius: 50%;
            transform: translate(-50%, 50%);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .matrix-node:hover {
            transform: translate(-50%, 50%) scale(1.5);
        }

        .node-label {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--bg-card);
            padding: 4px 10px;
            font-size: 0.85rem;
            border-radius: 4px;
            white-space: nowrap;
            border: 1px solid var(--border-color);
            color: var(--text-white);
        }

        .chart-inspector {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 6px;
            min-height: 80px;
            border-left: 3px solid var(--brand-neon);
        }

        /* Flip Cards */
        .flip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .flip-container {
            height: 220px;
            perspective: 1000px;
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flip-container:hover .flip-inner, .flip-container.flipped .flip-inner {
            transform: rotateY(180deg);
        }

        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .flip-front {
            background-color: var(--bg-gray);
            border: 1px solid var(--border-color);
            align-items: center;
            text-align: center;
        }
